[pytest]
# Base options with Allure
addopts = 
        --headed 
        --browser chromium 
        --slowmo=200 
        --alluredir=reports/allure-results 
        --html=reports/report.html --self-contained-html
        
testpaths = tests

# Uncomment for headed mode (visual browser)
# addopts = --headed --browser chromium --slowmo=200 --alluredir=reports/allure-results --html=reports/report.html --self-contained-html

# Markers for test categorization
markers =
    smoke: Smoke tests (critical functionality)
    regression: Regression tests
    login: Login related tests
    register: Registration tests
    referral: Referral tests
    redeem: Redeem tests
    profile: Profile tests
    dashboard: Dashboard tests
    e2e: End-to-end tests
    videocall: Video call tests (requires two test accounts)
